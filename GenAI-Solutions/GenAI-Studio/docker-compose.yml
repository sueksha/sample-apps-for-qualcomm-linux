# =============================================================================
# GenAI Studio — Docker Compose (Canonical)
#
# Services:
#   text-to-text    port 8088  image text-to-text:latest
#   image-to-text   port 8080  image image-to-text:responses-v1
#   text-to-image   port 8084  image text-to-image:latest
#   speech-to-text  port 8081  image speech-to-text:latest
#   text-to-speech  port 8083  image text-to-speech:latest
#   orchestrator    port 8090  image orchestrator:latest
#
# Host RPC library layout is not uniform across device images.
# Export HOST_RPC_LIB_DIR before compose up:
#   for d in /usr/lib/aarch64-linux-gnu /usr/lib; do
#     if [ -f "$d/libcdsprpc.so.1" ] && [ -f "$d/libdmabufheap.so.0" ]; then
#       export HOST_RPC_LIB_DIR="$d"; break
#     fi
#   done
# =============================================================================

x-cdi-device: &cdi-device
  deploy:
    resources:
      reservations:
        devices:
          - driver: cdi
            device_ids:
              - qualcomm.com/device=cdi-hw-acc
            capabilities: []

services:

  text-to-text:
    image: text-to-text:latest
    platform: linux/arm64
    container_name: text-to-text
    restart: on-failure:5
    network_mode: host
    environment:
      - TG_BIND_HOST=${TG_BIND_HOST:-0.0.0.0}
      - TG_BIND_PORT=${TG_BIND_PORT:-8088}
      - TG_MODELS_ROOT=${TG_MODELS_ROOT:-/opt/genai-studio-models/text-to-text}
      - TG_MODEL_NAME=${TG_MODEL_NAME:-llama_v3_2_3b_instruct_ssd-genie-w4a16-qualcomm_qcs9075}
      - TG_MODEL_DIR=${TG_MODEL_DIR:-/opt/genai-studio-models/text-to-text/llama_v3_2_3b_instruct_ssd-genie-w4a16-qualcomm_qcs9075}
      - GENIE_CONFIG=${GENIE_CONFIG:-/opt/genai-studio-models/text-to-text/llama_v3_2_3b_instruct_ssd-genie-w4a16-qualcomm_qcs9075/genie_config.json}
      - BASE_DIR=${BASE_DIR:-/opt/genai-studio-models/text-to-text/llama_v3_2_3b_instruct_ssd-genie-w4a16-qualcomm_qcs9075}
      - TG_MODEL_ID_OVERRIDE=${TG_MODEL_ID_OVERRIDE:-}
      - QAIRT_VERSION_HINT=${TG_QAIRT_VERSION_HINT:-build=2.45.0.260326;runtime=/opt/qairt/current/qairt_245_flat_libs}
      - LD_LIBRARY_PATH=${TG_LD_LIBRARY_PATH:-/opt/qairt/current/qairt_245_flat_libs:/opt/host-libs:/usr/lib:/usr/lib/aarch64-linux-gnu}
      - ADSP_LIBRARY_PATH=${TG_ADSP_LIBRARY_PATH:-/opt/qairt/current/qairt_245_flat_libs;/usr/lib/rfsa/adsp;/usr/lib/dsp;/dsp;/usr/lib/dsp/cdsp1}
    volumes:
      - ${TG_MODEL_HOST_DIR:-/opt/genai-studio-models/text-to-text}:/opt/genai-studio-models/text-to-text:ro
      - ${TG_QAIRT_LIBS_HOST_DIR:-/opt/qairt/current/qairt_245_flat_libs}:/opt/qairt/current/qairt_245_flat_libs:ro
      - /usr/lib/rfsa/adsp:/usr/lib/rfsa/adsp:ro
      - /usr/lib/dsp:/usr/lib/dsp:ro
      - /usr/share/qcom:/usr/share/qcom:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1.0.0:/opt/host-libs/libcdsprpc.so.1.0.0:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1:/opt/host-libs/libcdsprpc.so.1:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so:/opt/host-libs/libcdsprpc.so:ro
    <<: *cdi-device
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  image-to-text:
    image: ${IMAGE_TO_TEXT_IMAGE:-image-to-text:responses-v1}
    platform: linux/arm64
    container_name: image-to-text
    restart: always
    network_mode: host
    environment:
      - MODEL_NAME=${I2T_MODEL_NAME:-Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B}
      - MODEL_DIR=${I2T_MODEL_DIR:-/opt/genai-studio-models/image-to-text/Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B/files}
      - QAIRT_ROOT=${I2T_QAIRT_ROOT:-/opt/qairt/current}
      - QAIRT_FLAT_LIB_DIR=${I2T_QAIRT_FLAT_LIB_DIR:-/opt/qairt/current/qairt_245_flat_libs}
      - QAIRT_VERSION_HINT=${I2T_QAIRT_VERSION_HINT:-build=2.45.0.260326;runtime=/opt/qairt/current/qairt_245_flat_libs}
      - LD_LIBRARY_PATH=${I2T_LD_LIBRARY_PATH:-/opt/qairt/current/qairt_245_flat_libs:/opt/genai-studio-models/image-to-text/Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B/files:/opt/host-libs:/usr/lib:/usr/lib/aarch64-linux-gnu}
      - ADSP_LIBRARY_PATH=${I2T_ADSP_LIBRARY_PATH:-/opt/qairt/current/qairt_245_flat_libs;/opt/genai-studio-models/image-to-text/Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B/files;/usr/lib/rfsa/adsp;/usr/lib/dsp;/dsp;/usr/lib/dsp/cdsp1}
    volumes:
      - ${I2T_MODEL_HOST_DIR:-/opt/genai-studio-models/image-to-text/Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B/files}:/opt/genai-studio-models/image-to-text/Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B/files:rw
      - ${I2T_QAIRT_FLAT_LIB_DIR:-/opt/qairt/current/qairt_245_flat_libs}:/opt/qairt/current/qairt_245_flat_libs:ro
      - /tmp/genai-studio-lock:/opt/genai-lock
      - /usr/lib/rfsa/adsp:/usr/lib/rfsa/adsp:ro
      - /usr/lib/dsp:/usr/lib/dsp:ro
      - /usr/share/qcom:/usr/share/qcom:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libxdsprpc.so:/opt/host-libs/libxdsprpc.so:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1.0.0:/opt/host-libs/libcdsprpc.so.1.0.0:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1:/opt/host-libs/libcdsprpc.so.1:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so:/opt/host-libs/libcdsprpc.so:ro
    <<: *cdi-device
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test \"$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8080/v1/responses -H 'Content-Type: application/json' -d '{}')\" = \"400\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  text-to-image:
    image: ${TEXT_TO_IMAGE_IMAGE:-text-to-image:latest}
    platform: linux/arm64
    container_name: text-to-image
    restart: on-failure:5
    network_mode: host
    privileged: true
    environment:
      - MODEL_DIR=/opt/runtime
      - QAIRT_LIB_DIR=${IMG_QAIRT_LIB_DIR:-/opt/qairt/current/qairt_245_flat_libs}
      - QAIRT_ADSP_LIB_DIR=${IMG_QAIRT_ADSP_LIB_DIR:-/opt/qairt/current/qairt_245_flat_libs}
      - QAIRT_VERSION_HINT=${IMG_QAIRT_VERSION_HINT:-runtime=2.45.0.260326}
      - SD21_PREDICTION_TYPE=${IMG_SD21_PREDICTION_TYPE:-epsilon}
      - SD21_VAE_SCALING_FACTOR=${IMG_SD21_VAE_SCALING_FACTOR:-0.18215}
      - PORT=8084
      - IMAGE_GEN_CACHE_SIZE=16
      - IMAGE_GEN_API_KEY=${IMAGE_GEN_API_KEY:-qti-demo-key}
      - IMAGEGEN_I2T_ARBITRATION_ENABLED=${IMAGEGEN_I2T_ARBITRATION_ENABLED:-1}
      - IMAGEGEN_I2T_RELEASE_URL=${IMAGEGEN_I2T_RELEASE_URL:-http://127.0.0.1:8080/v1/session/release?unload=1}
      - IMAGEGEN_I2T_RELEASE_BEFORE_GENERATE=${IMAGEGEN_I2T_RELEASE_BEFORE_GENERATE:-1}
      - IMAGEGEN_TRANSIENT_RETRY_ATTEMPTS=${IMAGEGEN_TRANSIENT_RETRY_ATTEMPTS:-48}
      - IMAGEGEN_TRANSIENT_RETRY_BACKOFF_MS=${IMAGEGEN_TRANSIENT_RETRY_BACKOFF_MS:-1500}
      - TOKENIZER_DIR=/opt/runtime/tokenizer
      - LD_LIBRARY_PATH=/opt/qairt/current/qairt_245_flat_libs:/opt/runtime:/opt/host-libs:/usr/lib:/usr/lib/aarch64-linux-gnu
      - ADSP_LIBRARY_PATH=/opt/qairt/current/qairt_245_flat_libs;/opt/runtime;/usr/lib/rfsa/adsp;/usr/lib/dsp;/dsp;/usr/lib/dsp/cdsp1
    devices:
      - /dev/fastrpc-cdsp
      - /dev/fastrpc-cdsp-secure
      - /dev/fastrpc-cdsp1
      - /dev/fastrpc-cdsp1-secure
      - /dev/fastrpc-adsp-secure
    group_add:
      - "125"
    volumes:
      - ${IMAGEGEN_MODEL_DIR:-/opt/genai-studio-models/text-to-image/stable_diffusion_v2_1-qnn_context_binary-w8a16-qualcomm_qcs9075}:/opt/runtime:ro
      - ${IMG_QAIRT_LIBS_HOST_DIR:-/opt/qairt/current/qairt_245_flat_libs}:/opt/qairt/current/qairt_245_flat_libs:ro
      - /tmp/genai-studio-lock:/opt/genai-lock
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1.0.0:/opt/host-libs/libcdsprpc.so.1.0.0:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1:/opt/host-libs/libcdsprpc.so.1:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so:/opt/host-libs/libcdsprpc.so:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libxdsprpc.so:/opt/host-libs/libxdsprpc.so:ro
      - /usr/lib/rfsa/adsp:/usr/lib/rfsa/adsp:ro
      - /usr/lib/dsp:/usr/lib/dsp:ro
      - /usr/share/qcom:/usr/share/qcom:ro
      - /usr/lib/dsp/cdsp1/libc++.so.1:/usr/lib/dsp/cdsp1/libc++.so.1:ro
      - /usr/lib/dsp/cdsp1/libc++abi.so.1:/usr/lib/dsp/cdsp1/libc++abi.so.1:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8084'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  speech-to-text:
    image: speech-to-text:latest
    platform: linux/arm64
    container_name: speech-to-text
    restart: on-failure:5
    network_mode: host
    privileged: true
    environment:
      - MODEL_PATH=/opt/ASR_binary/Whisper/
      - QNN_LIB_DIR=/opt/qnn-host
      - QAIRT_VERSION_HINT=${STT_QAIRT_VERSION_HINT:-runtime=2.45.0.260326}
      - ASR_ASSETS_DIR=/opt/asr-assets
      - ASR_REALTIME_MAX_SESSIONS=${ASR_REALTIME_MAX_SESSIONS:-100}
      - ASR_REALTIME_MAX_PENDING_PCM_MB_PER_SESSION=${ASR_REALTIME_MAX_PENDING_PCM_MB_PER_SESSION:-16}
      - ASR_REALTIME_MAX_TOTAL_PENDING_PCM_MB=${ASR_REALTIME_MAX_TOTAL_PENDING_PCM_MB:-256}
      - LD_LIBRARY_PATH=${STT_LD_LIBRARY_PATH:-/opt/qnn-host:/opt/host-libs:/usr/lib:/usr/lib/aarch64-linux-gnu}
    group_add:
      - "125"
    volumes:
      - ${STT_MODEL_HOST_DIR:-/opt/genai-studio-models/speech-to-text/whisper_tiny-qnn_context_binary-float-qualcomm_qcs9075}:/opt/ASR_binary/Whisper:ro
      - ${STT_QNN_LIB_HOST_DIR:-/opt/qairt/current/qairt_245_flat_libs}:/opt/qnn-host:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1.0.0:/opt/host-libs/libcdsprpc.so.1.0.0:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1:/opt/host-libs/libcdsprpc.so.1:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so:/opt/host-libs/libcdsprpc.so:ro
      - /usr/lib/rfsa/adsp:/usr/lib/rfsa/adsp:ro
      - /usr/lib/dsp:/usr/lib/dsp:ro
      - /usr/share/qcom:/usr/share/qcom:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  text-to-speech:
    build:
      context: ./core-services/text-to-speech/meloTTS
    image: text-to-speech:latest
    platform: linux/arm64
    container_name: text-to-speech
    restart: on-failure:5
    network_mode: host
    privileged: true
    environment:
      - MODEL_PATH=/opt/TTS_binary/MeloTTS
      - QAIRT_FLAT_LIB_DIR=${TTS_QAIRT_FLAT_LIB_DIR:-/opt/qairt/current/qairt_245_flat_libs}
      - LD_LIBRARY_PATH=/opt/qairt/current/qairt_245_flat_libs:/opt/TTS_binary/MeloTTS:/opt/host-libs:/usr/lib:/usr/lib/aarch64-linux-gnu
      - DSP_LIBRARY_PATH=/opt/TTS_binary/MeloTTS
      - ADSP_LIBRARY_PATH=/opt/qairt/current/qairt_245_flat_libs;/opt/TTS_binary/MeloTTS;/usr/lib/rfsa/adsp;/usr/lib/dsp;/usr/lib/dsp/cdsp;/dsp;/usr/lib/dsp/cdsp1
    command: ["/bin/bash", "/app/run.sh", "--model-path", "/opt/TTS_binary/MeloTTS", "--language", "English", "--port", "8083"]
    devices:
      - /dev/fastrpc-cdsp
      - /dev/fastrpc-cdsp-secure
      - /dev/fastrpc-cdsp1
      - /dev/fastrpc-cdsp1-secure
      - /dev/fastrpc-adsp-secure
    group_add:
      - "125"
    volumes:
      - ./core-services/text-to-speech/meloTTS/run.sh:/app/run.sh:ro
      - ${TTS_MODEL_HOST_DIR:-/opt/genai-studio-models/text-to-speech/melo-tts-v73/files}:/opt/TTS_binary/MeloTTS:ro
      - ${TTS_QAIRT_FLAT_LIB_DIR:-/opt/qairt/current/qairt_245_flat_libs}:/opt/qairt/current/qairt_245_flat_libs:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1.0.0:/opt/host-libs/libcdsprpc.so.1.0.0:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so.1:/opt/host-libs/libcdsprpc.so.1:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libcdsprpc.so:/opt/host-libs/libcdsprpc.so:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libxdsprpc.so:/opt/host-libs/libxdsprpc.so:ro
      - ${HOST_RPC_LIB_DIR:-/usr/lib/aarch64-linux-gnu}/libdmabufheap.so.0:/opt/host-libs/libdmabufheap.so.0:ro
      - ${TTS_ADSP_HOST_DIR:-/usr/lib/rfsa/adsp}:/usr/lib/rfsa/adsp:ro
      - /usr/lib/dsp:/usr/lib/dsp:ro
      - /usr/share/qcom:/usr/share/qcom:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8083'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  orchestrator:
    image: orchestrator:latest
    platform: linux/arm64
    container_name: orchestrator
    restart: on-failure:5
    network_mode: host
    environment:
      - PORT=8090
      - TG_URL=http://localhost:8088
      - TG_INTERNAL_API_KEY=${TG_INTERNAL_API_KEY:-tg-internal-placeholder-key}
      - TG_ORCHESTRATOR_MODEL_ID=${TG_ORCHESTRATOR_MODEL_ID:-genie}
      - TG_DIRECT_MODEL_ID=${TG_DIRECT_MODEL_ID:-llama3.2-3B}
      - TG_SINGLE_FLIGHT_TIMEOUT_SEC=${TG_SINGLE_FLIGHT_TIMEOUT_SEC:-30}
      - TG_BUSY_RETRY_AFTER_SEC=${TG_BUSY_RETRY_AFTER_SEC:-2}
      - STT_URL=http://localhost:8081
      - TTS_URL=http://localhost:8083
      - IMG_URL=http://localhost:8084
      - IMG_API_KEY=${IMG_API_KEY:-qti-demo-key}
      - I2T_URL=http://localhost:8080
      - I2T_CONTAINER_NAME=image-to-text
      - I2T_RESTART_ON_PIPELINE_ERROR=1
      - IMG_I2T_ARBITRATION_ENABLED=1
      - NPU_ARB_ENABLED=1
      - NPU_ARB_TIMEOUT_SEC=180
      - MODEL_DIR=/opt/genai-studio-models/image-to-text/Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B/files
      - UPLOADS_DIR=/opt/genai-studio-models/image-to-text/Lemans_LE_Gen2_QNN2_41_qwen25_vl_7B/files/uploads
    volumes:
      - /opt/genai-studio-models:/opt/genai-studio-models
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HF_CACHE_HOST_DIR:-/opt/genai-studio-cache/huggingface}:/root/.cache/huggingface
    depends_on:
      - text-to-text
      - image-to-text
      - text-to-image
      - speech-to-text
      - text-to-speech
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
